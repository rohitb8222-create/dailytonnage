<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sumeet Elko - Premium Tonnage App</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #072e4a 0%, #0c4a6e 50%, #0284c7 100%);
      color: #f0f9ff;
      min-height: 100vh;
      padding: 12px;
    }
    
    /* 🌌 Premium Dark Sky Blue Header */
    .main-header {
      background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 100%);
      color: white;
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .main-header h2 { font-weight: 800; font-size: 1.4rem; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
    .main-header p { font-size: 0.8rem; margin-top: 4px; margin-bottom: 0; opacity: 0.9; font-weight: 500; letter-spacing: 0.5px; }
    
    /* 🔘 Navigation Tabs */
    .nav-container {
      background: rgba(15, 23, 42, 0.4);
      padding: 6px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .btn-action { 
      font-weight: 700; 
      border-radius: 10px; 
      font-size: 0.9rem; 
      transition: all 0.3s ease;
      padding: 10px;
    }
    .btn-active-tab {
      background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%) !important;
      color: white !important;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
    }
    
    /* 🃏 Cards */
    .card-custom {
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 16px;
    }
    
    .filter-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #bae6fd;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .form-control, .form-select {
      background-color: #072e4a !important;
      border: 1px solid rgba(56, 189, 248, 0.3) !important;
      color: #f0f9ff !important;
      border-radius: 8px;
    }
    .form-control:focus, .form-select:focus {
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25) !important;
    }

    /* 📊 Top Analytics Counter Cards (सर्व आकडे आता वर दिसणार) */
    .stat-card {
      background: rgba(7, 46, 74, 0.8);
      border-radius: 12px;
      padding: 12px;
      border-top: 4px solid #38bdf8;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    .stat-card.wet { border-top-color: #10b981; }
    .stat-card.dry { border-top-color: #f59e0b; }
    .stat-card.mix { border-top-color: #a855f7; }
    .stat-card.trips { border-top-color: #f43f5e; }
    
    .stat-val { font-size: 1.25rem; font-weight: 800; color: #ffffff; margin-bottom: 0; }
    .stat-lbl { font-size: 0.68rem; color: #93c5fd; font-weight: 600; text-transform: uppercase; margin-top: 2px; }

    /* 📋 Professional Table */
    .table-responsive { border-radius: 12px; overflow: hidden; border: 1px solid rgba(56, 189, 248, 0.2); }
    .table-clean { margin-bottom: 0; font-size: 0.85rem; width: 100%; color: #f0f9ff; }
    .table-clean th { background-color: #072e4a; font-weight: 700; color: #bae6fd; text-align: center; padding: 12px; border-bottom: 2px solid rgba(56, 189, 248, 0.2); }
    .table-clean td { text-align: center; vertical-align: middle; padding: 10px 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .table-striped tbody tr:nth-of-type(odd) { background-color: rgba(255, 255, 255, 0.03); }
    .table-striped tbody tr:nth-of-type(even) { background-color: rgba(0, 0, 0, 0.15); }
    .row-total { background: linear-gradient(90deg, #072e4a 0%, #0c4a6e 100%) !important; font-weight: 800; color: #38bdf8; }

    .chart-container { position: relative; margin: auto; height: 180px; width: 100%; }
    .refresh-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; background-color: rgba(16, 185, 129, 0.2); color: #34d399; font-weight: 700; }
  </style>
</head>
<body>

  <div class="container-fluid p-0" style="max-width: 540px; margin: 0 auto;">
    
    <div class="main-header">
      <h2>SUMEET ELKO</h2>
      <p>SWM • Live KG Waste Management Tracker</p>
    </div>

    <div class="d-flex justify-content-center gap-2 mb-3 nav-container">
      <button class="btn btn-active-tab text-white w-50 btn-action" id="view-dash-btn" onclick="switchMainView('dash')">
        <i class="fa-solid fa-chart-simple me-1"></i> Dashboard
      </button>
      <button class="btn btn-link text-info w-50 btn-action text-decoration-none" id="view-form-btn" onclick="switchMainView('form')">
        <i class="fa-solid fa-square-plus me-1"></i> Entry Form
      </button>
    </div>

    <div id="main-dashboard-view">
      
      <div class="card-custom">
        <div class="row g-2">
          <div class="col-12">
            <label class="filter-label">Admin Ward Filter</label>
            <select class="form-select form-select-sm" id="filter-ward" onchange="filterDashboardData()">
              <option value="ALL">All Wards (सर्व वॉर्ड)</option>
              <option value="D">D Ward</option>
              <option value="E">E Ward</option>
              <option value="F">F Ward</option>
              <option value="G">G Ward</option>
              <option value="H">H Ward</option>
              <option value="I">I Ward</option>
              <option value="J">J Ward</option>
            </select>
          </div>
          <div class="col-6">
            <label class="filter-label">From Date</label>
            <input type="date" class="form-control form-control-sm" id="filter-from-date" onchange="filterDashboardData()">
          </div>
          <div class="col-6">
            <label class="filter-label">To Date</label>
            <input type="date" class="form-control form-control-sm" id="filter-to-date" onchange="filterDashboardData()">
          </div>
        </div>
      </div>

      <div class="row g-2 mb-3 px-1">
        <div class="col-7">
          <div class="stat-card">
            <div class="stat-val text-info" id="stat-total-wt">0</div>
            <div class="stat-lbl">Total Weight (KG)</div>
          </div>
        </div>
        <div class="col-5">
          <div class="stat-card trips">
            <div class="stat-val" id="stat-total-trips">0</div>
            <div class="stat-lbl">Total Trips (गाड्या)</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card wet">
            <div class="stat-val" id="stat-wet-wt">0</div>
            <div class="stat-lbl">Wet Waste (ओला)</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card dry">
            <div class="stat-val" id="stat-dry-wt">0</div>
            <div class="stat-lbl">Dry Waste (सुका)</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card mix">
            <div class="stat-val" id="stat-mix-wt">0</div>
            <div class="stat-lbl">Mix Waste (मिश्र)</div>
          </div>
        </div>
      </div>

      <div class="card-custom">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span class="fw-bold" style="font-size:0.85rem; color:#bae6fd;"><i class="fa-solid fa-chart-pie text-info"></i> Chart Analysis (KG)</span>
          <span class="refresh-badge"><i class="fa-solid fa-rotate"></i> Live Data</span>
        </div>
        <div class="chart-container">
          <canvas id="analyticsChart"></canvas>
        </div>
      </div>

      <div id="dashboard-capture-area" style="background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(56, 189, 248, 0.2);" class="p-3 rounded-4 shadow-lg mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-bold text-white" style="font-size:0.85rem;" id="table-title">Summary Details</span>
          <div>
            <button class="btn btn-sm btn-outline-info border-0 p-1 me-2" style="font-size:0.75rem;" onclick="loadDashboardData()"><i class="fa-solid fa-sync"></i> Refresh</button>
            <button class="btn btn-sm btn-success text-white fw-bold px-2 py-1" style="font-size:0.75rem; background: #0284c7; border:none;" onclick="downloadDashboard()"><i class="fa-solid fa-download"></i> PNG</button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-clean table-striped align-middle">
            <thead>
              <tr>
                <th>Vehicle No</th>
                <th>Ward</th>
                <th>Waste Type</th>
                <th>Weight (KG)</th>
              </tr>
            </thead>
            <tbody id="dashboard-table-body">
              <tr><td colspan="4" class="text-center text-muted py-3">डेटा लोड होत आहे...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="main-form-view" class="d-none">
      <div class="card-custom">
        <h6 class="text-center mb-3 fw-bold text-white border-bottom border-secondary pb-2"><i class="fa-solid fa-truck-moving text-info"></i> Daily Garbage Entry (In KG)</h6>
        <form id="garbageForm" onsubmit="submitForm(event)">
          
          <div class="mb-2">
            <label class="form-label text-light fw-bold mb-1" style="font-size:0.8rem;">Vehicle Number (गाडी नंबर)</label>
            <input type="text" class="form-control form-control-sm text-uppercase" id="vehicleNumber" placeholder="MH-05-AS-1234" required>
          </div>
          
          <div class="mb-2">
            <label class="form-label text-light fw-bold mb-1" style="font-size:0.8rem;">Admin Ward (प्रशासकीय वॉर्ड)</label>
            <select class="form-select form-select-sm" id="adminWard" required>
              <option value="">-- Choose Ward --</option>
              <option value="D">D Ward</option>
              <option value="E">E Ward</option>
              <option value="F">F Ward</option>
              <option value="G">G Ward</option>
              <option value="H">H Ward</option>
              <option value="I">I Ward</option>
              <option value="J">J Ward</option>
            </select>
          </div>
          
          <div class="mb-2">
            <label class="form-label text-light fw-bold mb-1" style="font-size:0.8rem;">Garbage Type (कचऱ्याचा प्रकार)</label>
            <select class="form-select form-select-sm" id="garbageType" required>
              <option value="">-- Select Type --</option>
              <option value="Wet Waste (ओला कचरा)">Wet Waste (ओला कचरा)</option>
              <option value="Dry Waste (सुका कचरा)">Dry Waste (सुका कचरा)</option>
              <option value="Mix Waste (मिश्र कचरा)">Mix Waste (मिश्र कचरा)</option>
            </select>
          </div>
          
          <div class="mb-4">
            <label class="form-label text-light fw-bold mb-1" style="font-size:0.8rem;">Enter Weight in KG (वजन फक्त किलोग्राम मध्ये)</label>
            <div class="input-group input-group-lg">
              <input type="number" class="form-control fw-bold text-info" id="weight" placeholder="e.g. 450" min="1" required>
              <span class="input-group-text bg-dark text-info border-secondary fw-bold">KG</span>
            </div>
          </div>
          
          <button type="submit" class="btn w-100 fw-bold btn-action py-2.5 text-white border-0" style="background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 100%);" id="submitBtn">
            <i class="fa-solid fa-paper-plane me-1"></i> Submit & Auto Refresh Dashboard
          </button>
        </form>
        <div id="responseMessage" class="alert mt-3 d-none text-center p-2 fw-bold" style="font-size:0.85rem;"></div>
      </div>
    </div>

  </div>

  <script>
    // तुमची गुगल वेब ॲप मॅक्रो URL इथे टाका:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxM3_YVFFwYsNSe0NXTGaTHN71FTQeIefsl_5BihKSSk1AsiWzTHIDcNjM8WFSDtVej/exec";
    
    let rawDataGlobal = [];
    let myChart = null;

    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('filter-from-date').value = today;
      document.getElementById('filter-to-date').value = today;
      loadDashboardData();
    });

    function loadDashboardData() {
      fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => { 
          rawDataGlobal = data; 
          filterDashboardData(); 
        })
        .catch(err => console.error("Error Loading Data:", err));
    }

    function switchMainView(view) {
      if(view === 'dash') {
        document.getElementById('main-dashboard-view').classList.remove('d-none');
        document.getElementById('main-form-view').classList.add('d-none');
        document.getElementById('view-dash-btn').className = "btn btn-active-tab text-white w-50 btn-action";
        document.getElementById('view-form-btn').className = "btn btn-link text-info w-50 btn-action text-decoration-none";
        loadDashboardData();
      } else {
        document.getElementById('main-dashboard-view').classList.add('d-none');
        document.getElementById('main-form-view').classList.remove('d-none');
        document.getElementById('view-dash-btn').className = "btn btn-link text-info w-50 btn-action text-decoration-none";
        document.getElementById('view-form-btn').className = "btn btn-active-tab text-white w-50 btn-action";
      }
    }

    function filterDashboardData() {
      const selectedWard = document.getElementById("filter-ward").value;
      const fromDate = document.getElementById("filter-from-date").value;
      const toDate = document.getElementById("filter-to-date").value;
      
      document.getElementById('table-title').innerText = selectedWard === "ALL" ? "All Wards Summary Details" : `Ward ${selectedWard} Summary Details`;

      var tbody = document.getElementById("dashboard-table-body");
      tbody.innerHTML = "";

      if(rawDataGlobal.length <= 1) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-3">डेटा उपलब्ध नाही...</td></tr>`;
        resetCounters();
        return;
      }

      let totalWeight = 0;
      let totalTrips = 0;
      let wetWeight = 0;
      let dryWeight = 0;
      let mixWeight = 0;
      
      let chartDataMap = { "Wet Waste (ओला कचरा)": 0, "Dry Waste (सुका कचरा)": 0, "Mix Waste (मिश्र कचरा)": 0 };

      for (let i = 1; i < rawDataGlobal.length; i++) {
        let row = rawDataGlobal[i];
        let rowDate = row[0] ? row[0].split('T')[0] : ""; 
        let vNo = row[1];
        let ward = row[2];
        let gType = row[3];
        let weight = Number(row[4]) || 0;

        let wardMatch = (selectedWard === "ALL" || ward === selectedWard);
        let dateMatch = (!fromDate || !toDate || (rowDate >= fromDate && rowDate <= toDate));

        if(wardMatch && dateMatch) {
          totalTrips++;
          totalWeight += weight;
          
          if(gType.includes("Wet")) wetWeight += weight;
          if(gType.includes("Dry")) dryWeight += weight;
          if(gType.includes("Mix")) mixWeight += weight;

          if(chartDataMap[gType] !== undefined) {
            chartDataMap[gType] += weight;
          }

          let tr = document.createElement("tr");
          tr.innerHTML = `
            <td><b>${vNo}</b></td>
            <td><span class="badge bg-info text-dark fw-bold">${ward}</span></td>
            <td>${gType.split(' ')[0]}</td>
            <td class="text-end fw-bold text-warning">${weight.toLocaleString()}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      // 🔢 आकडे स्क्रीनवर वरच्या बाजूला दाखवणे
      document.getElementById("stat-total-wt").innerText = totalWeight.toLocaleString();
      document.getElementById("stat-total-trips").innerText = totalTrips;
      document.getElementById("stat-wet-wt").innerText = wetWeight.toLocaleString();
      document.getElementById("stat-dry-wt").innerText = dryWeight.toLocaleString();
      document.getElementById("stat-mix-wt").innerText = mixWeight.toLocaleString();

      if(totalTrips === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-3">निवडलेल्या फिल्टरमध्ये डेटा सापडला नाही.</td></tr>`;
      } else {
        let totalTr = document.createElement("tr");
        totalTr.className = "row-total";
        totalTr.innerHTML = `
          <td colspan="3" class="text-start">TOTAL SUM (KG)</td>
          <td class="text-end text-info font-extrabold">${totalWeight.toLocaleString()} KG</td>
        `;
        tbody.appendChild(totalTr);
      }

      renderChart(chartDataMap);
    }

    function resetCounters() {
      document.getElementById("stat-total-wt").innerText = "0";
      document.getElementById("stat-total-trips").innerText = "0";
      document.getElementById("stat-wet-wt").innerText = "0";
      document.getElementById("stat-dry-wt").innerText = "0";
      document.getElementById("stat-mix-wt").innerText = "0";
    }

    function renderChart(chartData) {
      const ctx = document.getElementById('analyticsChart').getContext('2d');
      if(myChart) { myChart.destroy(); }

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Wet', 'Dry', 'Mix'],
          datasets: [{
            data: [chartData["Wet Waste (ओला कचरा)"], chartData["Dry Waste (सुका कचरा)"], chartData["Mix Waste (मिश्र कचरा)"]],
            backgroundColor: ['#10b981', '#f59e0b', '#a855f7'],
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { 
            y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#93c5fd' } },
            x: { grid: { display: false }, ticks: { color: '#93c5fd', font: { weight: 'bold' } } }
          }
        }
      });
    }

    function submitForm(e) {
      e.preventDefault();
      var submitBtn = document.getElementById("submitBtn");
      var respMsg = document.getElementById("responseMessage");
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Uploading Entry...";

      var formData = {
        vehicleNumber: document.getElementById("vehicleNumber").value.trim().toUpperCase(),
        adminWard: document.getElementById("adminWard").value,
        garbageType: document.getElementById("garbageType").value,
        weight: parseInt(document.getElementById("weight").value) // पूर्ण संख्या KG मध्ये जाईल
      };

      fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(formData) })
      .then(res => res.json())
      .then(response => {
        submitBtn.disabled = false; 
        submitBtn.innerHTML = "<i class='fa-solid fa-paper-plane me-1'></i> Submit & Auto Refresh Dashboard";
        
        respMsg.className = "alert alert-success mt-2 text-center p-2 fw-bold text-dark";
        respMsg.innerText = "👍 एंट्री यशस्वीरित्या जमा झाली! डॅशबोर्ड रिफ्रेश होत आहे...";
        respMsg.classList.remove("d-none");
        
        document.getElementById("garbageForm").reset();
        
        setTimeout(() => {
          respMsg.classList.add("d-none");
          switchMainView('dash');
        }, 1200);

      }).catch(err => {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<i class='fa-solid fa-paper-plane me-1'></i> Submit & Auto Refresh Dashboard";
        alert("डेटा सेव्ह करताना त्रुटी आली, नेटवर्क चेक करा!");
      });
    }

    function downloadDashboard() {
      var element = document.getElementById("dashboard-capture-area");
      const ward = document.getElementById("filter-ward").value;
      html2canvas(element, { scale: 2, backgroundColor: "#072e4a" }).then(canvas => {
        var link = document.createElement('a');
        link.download = 'SumeetElko_SkyBlue_Ward_' + ward + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
